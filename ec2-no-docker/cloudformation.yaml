AWSTemplateFormatVersion: '2010-09-09'
Description: Scylla Migrator - EC2 without Docker. Amazon Linux, Spark binaries, Flask web app.
# Deploys a single EC2 instance with SSM, Spark 3.5.8 (master+worker), and the Python Flask UI.
# No Docker - native Spark and Flask on the host.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the migrator instance will be deployed
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet in the chosen VPC
  VpcCidrBlock:
    Type: String
    Description: CIDR block of the VPC (e.g. 10.0.0.0/16)
    Default: '10.0.0.0/16'
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for EC2 access
  InstanceType:
    Type: String
    Default: m6i.4xlarge
    Description: EC2 instance type
    AllowedValues:
      - t3.xlarge
      - t3.2xlarge
      - m6i.4xlarge
      - m6i.6xlarge
      - c6i.4xlarge
      - c6i.6xlarge
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: 'CIDR allowed for web app and Spark UIs. Use x.x.x.x/32 for single IP (e.g. 106.222.205.22/32)'
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}(/[0-9]{1,2})?$'
  RepoUrl:
    Type: String
    Default: https://github.com/sgopalakrishnan1980/scylla-migrator.git
    Description: 'Git repo URL for scylla-migrator. Must include web-app/ directory for the Flask UI. Upstream may not have web-app; use a fork that includes it.'
  PrebuiltJarBucket:
    Type: String
    Default: ''
    Description: '(Optional) S3 bucket for pre-built migrator JAR. Leave empty to build from source.'
  PrebuiltJarKey:
    Type: String
    Default: ''
    Description: '(Optional) S3 key for pre-built migrator JAR (e.g. migrator/migrator-assembly.jar).'
  BootstrapScriptUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/sgopalakrishnan1980/scylla-migrator/main/ec2-no-docker/scripts/bootstrap.sh'
    Description: 'URL of the bootstrap script (must be under 16KB UserData). Override for forks/branches.'

Conditions:
  UsePrebuiltJar: !And [!Not [!Equals [!Ref PrebuiltJarBucket, '']], !Not [!Equals [!Ref PrebuiltJarKey, '']]]
  AllowedCidrNeedsSuffix: !Equals [!Select [1, !Split ['/', !Ref AllowedCidr]], '']

Resources:
  MigratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'scylla-migrator-no-docker-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  MigratorInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub 'scylla-migrator-no-docker-${AWS::StackName}'
      Roles:
        - !Ref MigratorRole

  MigratorRoleS3Policy:
    Type: AWS::IAM::Policy
    Condition: UsePrebuiltJar
    Properties:
      PolicyName: S3GetPrebuiltJar
      Roles:
        - !Ref MigratorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${PrebuiltJarBucket}/*'

  MigratorRoleEC2Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EC2DescribeSelf
      Roles:
        - !Ref MigratorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: ec2:DescribeInstances
            Resource: '*'

  MigratorRoleDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DynamoDBFullAccess
      Roles:
        - !Ref MigratorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: dynamodb:*
            Resource: '*'

  MigratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'scylla-migrator-no-docker-${AWS::StackName}'
      GroupDescription: Scylla Migrator no-docker - Web App, Spark UIs
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: SSH
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: !Ref VpcCidrBlock
          Description: All from VPC
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Web App
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Spark Master UI
        - IpProtocol: tcp
          FromPort: 18080
          ToPort: 18080
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Spark History Server
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Spark Worker UI
        - IpProtocol: tcp
          FromPort: 15002
          ToPort: 15002
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Spark Connect Server
        - IpProtocol: tcp
          FromPort: 8998
          ToPort: 8998
          CidrIp: !If [AllowedCidrNeedsSuffix, !Sub '${AllowedCidr}/32', !Ref AllowedCidr]
          Description: Apache Livy
      Tags:
        - Key: Name
          Value: !Sub 'scylla-migrator-no-docker-sg-${AWS::StackName}'

  MigratorInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref MigratorSecurityGroup
      IamInstanceProfile: !Ref MigratorInstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            set -e
            exec > >(tee /var/log/user-data.log) 2>&1
            export SPARK_VERSION=3.5.8
            export REPO_URL="${RepoUrl}"
            export DEPLOY_DIR=/home/ec2-user/scylla-migrator
            export PREBUILT_BUCKET="${PrebuiltJarBucket}"
            export PREBUILT_KEY="${PrebuiltJarKey}"
            BOOTSTRAP_URL="${BootstrapScriptUrl}"
            if ! curl -sSLf "$BOOTSTRAP_URL" -o /tmp/bootstrap.sh; then
              echo "Bootstrap script download failed (e.g. 404). Ensure BootstrapScriptUrl points to a URL where ec2-no-docker/scripts/bootstrap.sh is available (e.g. your fork/branch or S3)."
              exit 1
            fi
            chmod +x /tmp/bootstrap.sh
            exec bash /tmp/bootstrap.sh
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub 'scylla-migrator-no-docker-${AWS::StackName}'

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref MigratorInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  PublicIp:
    Description: Public IP
    Value: !GetAtt MigratorInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'
  WebAppUrl:
    Description: Web app (Flask UI) - click to open
    Value: !Sub 'http://${MigratorInstance.PublicIp}:5000'
    Export:
      Name: !Sub '${AWS::StackName}-WebAppUrl'
  SparkMasterUrl:
    Description: Spark Master UI - click to open
    Value: !Sub 'http://${MigratorInstance.PublicIp}:8080'
    Export:
      Name: !Sub '${AWS::StackName}-SparkMasterUrl'
  SparkHistoryUrl:
    Description: Spark History Server - click to open
    Value: !Sub 'http://${MigratorInstance.PublicIp}:18080'
    Export:
      Name: !Sub '${AWS::StackName}-SparkHistoryUrl'
  SshCommand:
    Description: SSH command
    Value: !Sub 'ssh -i <your-key.pem> ec2-user@${MigratorInstance.PublicIp}'
  SsmConnectCommand:
    Description: Connect via SSM
    Value: !Sub 'aws ssm start-session --target ${MigratorInstance}'
  SparkConnectUrl:
    Description: Spark Connect endpoint (sc://)
    Value: !Sub 'sc://${MigratorInstance.PublicIp}:15002'
  LivyUrl:
    Description: Apache Livy REST API (job submission)
    Value: !Sub 'http://${MigratorInstance.PublicIp}:8998'
    Export:
      Name: !Sub '${AWS::StackName}-LivyUrl'
