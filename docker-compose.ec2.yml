# EC2 deployment: Spark + web app only. No Scylla/Alternator — connect to your own target.
# Use for: migrator configuration, Spark setup, and the web app for easy use.

networks:
  scylla-migrator-spark-network:
    driver: bridge

services:
  spark-master:
    build: dockerfiles/spark
    command: master
    environment:
      SPARK_PUBLIC_DNS: ${EXTERNAL_HOST:-localhost}
      SPARK_HISTORY_OPTS: "-Dspark.history.ui.bindAddress=0.0.0.0 -Dspark.history.fs.logDirectory=file:/tmp/spark-events"
    ports:
      - 4040:4040
      - 8080:8080
      - 18080:18080  # Spark History Server
    volumes:
      - ./data/spark-master:/tmp/data
      - ./data/spark-events:/tmp/spark-events
      - ./migrator/target/scala-2.13:/jars
      - ./parquet-data:/parquet-data
      - ./:/app
      - ./web-app/log4j2-debug.properties:/spark/conf/log4j2-debug.properties
    networks:
      - scylla-migrator-spark-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    working_dir: /home/dynamodblocal
    ports:
      - "8001:8000"
    networks:
      - scylla-migrator-spark-network

  spark-worker:
    build: dockerfiles/spark
    command: worker
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_PUBLIC_DNS: ${EXTERNAL_HOST:-localhost}
    ports:
      - 8081:8081
    volumes:
      - ./data/spark-worker:/tmp/data
      - ./parquet-data:/parquet-data
      - ./web-app/log4j2-debug.properties:/spark/conf/log4j2-debug.properties
    depends_on:
      - spark-master
    networks:
      - scylla-migrator-spark-network

  web-app:
    build: web-app
    working_dir: /app/web-app
    ports:
      - "5000:5000"
    environment:
      SPARK_MASTER_HOST: spark-master
      EXTERNAL_HOST: ${EXTERNAL_HOST:-}
      SPARK_NETWORK_FILTER: scylla-migrator
      MIGRATOR_CONFIG_PATH: /app/config.yaml
      USE_DOCKER_EXEC: "1"
      FLASK_APP: app.py
    volumes:
      - ./:/app
      - ./migrator/target/scala-2.13:/jars
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - spark-master
    networks:
      - scylla-migrator-spark-network
