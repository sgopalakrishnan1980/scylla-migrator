# Debug logging for Scylla Migrator - driver, executor, master, worker
# Use with: --conf spark.driver.extraJavaOptions=-Dlog4j2.configurationFile=/spark/conf/log4j2-debug.properties
#           --conf spark.executor.extraJavaOptions=-Dlog4j2.configurationFile=/spark/conf/log4j2-debug.properties

rootLogger.level = debug
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# Migrator and ScyllaDB packages - max debug
logger.scylladb.name = com.scylladb
logger.scylladb.level = debug

# Spark internals - debug for driver, executor, scheduler, tasks
logger.spark.name = org.apache.spark
logger.spark.level = debug
logger.spark2.name = org.apache.spark.scheduler
logger.spark2.level = debug
logger.spark3.name = org.apache.spark.TaskSetManager
logger.spark3.level = debug
logger.spark4.name = org.apache.spark.executor
logger.spark4.level = debug
logger.spark5.name = org.apache.spark.storage
logger.spark5.level = debug

# Hadoop/DynamoDB connector
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = debug

# Cassandra connector
logger.cassandra.name = com.datastax
logger.cassandra.level = debug
